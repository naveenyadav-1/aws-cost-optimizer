<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — AWS Cost Optimizer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 2.5rem;
      width: 400px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .logo { text-align: center; margin-bottom: 1.5rem; }
    .logo span { font-size: 2.5rem; }
    .logo h1 { font-size: 1.1rem; color: #333; margin-top: 8px; font-weight: 600; }
    h2 { font-size: 1.3rem; color: #1a1a1a; margin-bottom: 1.5rem; text-align: center; }
    input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      font-size: 14px;
      margin-bottom: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #FF9900; }
    button {
      width: 100%;
      padding: 13px;
      background: #FF9900;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #e68900; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    .toggle { text-align: center; margin-top: 1.2rem; font-size: 13px; color: #666; }
    .toggle span { color: #FF9900; cursor: pointer; font-weight: 600; }
    .msg { padding: 10px 14px; border-radius: 8px; margin-bottom: 14px; font-size: 13px; display: none; }
    .msg.error { background: #fff0f0; color: #cc0000; border: 1px solid #ffcccc; }
    .msg.success { background: #f0fff4; color: #007700; border: 1px solid #99ffbb; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <span>☁️</span>
    <h1>AWS Cost Optimizer</h1>
  </div>
  <h2 id="form-title">Welcome back</h2>
  <div class="msg" id="msg"></div>
  <input type="email" id="email" placeholder="Email address" />
  <input type="password" id="password" placeholder="Password" />
  <button id="btn" onclick="submitForm()">Login</button>
  <div class="toggle" id="toggle">
    No account? <span onclick="toggleMode()">Register here</span>
  </div>
</div>

<script>
  let isLogin = true;

  // If already logged in go to dashboard
  if (localStorage.getItem('token')) {
    window.location.href = 'index.html';
  }

  function toggleMode() {
    isLogin = !isLogin;
    document.getElementById('form-title').textContent = isLogin ? 'Welcome back' : 'Create account';
    document.getElementById('btn').textContent = isLogin ? 'Login' : 'Register';
    document.getElementById('toggle').innerHTML = isLogin
      ? 'No account? <span onclick="toggleMode()">Register here</span>'
      : 'Have account? <span onclick="toggleMode()">Login</span>';
    showMsg('', '');
  }

  function showMsg(text, type) {
    const el = document.getElementById('msg');
    el.textContent = text;
    el.className = 'msg ' + type;
    el.style.display = text ? 'block' : 'none';
  }

  async function submitForm() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('btn');

    if (!email || !password) return showMsg('Please fill all fields', 'error');

    btn.disabled = true;
    btn.textContent = 'Please wait...';

    try {
      const url = isLogin ? '/api/auth/login' : '/api/auth/register';
      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();

      if (!res.ok) return showMsg(data.error, 'error');

      if (isLogin) {
        localStorage.setItem('token', data.token);
        localStorage.setItem('userEmail', data.user.email);
        window.location.href = 'index.html';
      } else {
        showMsg(data.message, 'success');
        setTimeout(() => toggleMode(), 2000);
      }
    } catch (err) {
      showMsg('Network error. Is server running?', 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = isLogin ? 'Login' : 'Register';
    }
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') submitForm();
  });
</script>
</body>
</html>
